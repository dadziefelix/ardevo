<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardevo — Watch. Detect. Protect.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0f1923;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a2f5a, #0f1923);
            border-bottom: 2px solid #D4A017;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 2.5rem;
            color: #D4A017;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .logo p {
            color: #8899aa;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .run-btn {
            background: #D4A017;
            color: #0f1923;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .run-btn:hover {
            background: #f0b820;
            transform: translateY(-2px);
        }

        .main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a2f5a;
            border: 1px solid #2a4a7a;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #D4A017;
        }

        .stat-card .label {
            color: #8899aa;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .section-title {
            color: #D4A017;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a4a7a;
        }

        .transaction-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-card {
            background: #1a2f5a;
            border-radius: 8px;
            padding: 16px 20px;
            display: grid;
            grid-template-columns: 120px 1fr 1fr 1fr 1fr 160px;
            align-items: center;
            gap: 16px;
            border-left: 4px solid #2a4a7a;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .transaction-card.high {
            border-left-color: #e74c3c;
        }

        .transaction-card.medium {
            border-left-color: #f39c12;
        }

        .transaction-card.low {
            border-left-color: #2ecc71;
        }

        .risk-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
        }

        .risk-badge.high {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .risk-badge.medium {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
            border: 1px solid #f39c12;
        }

        .risk-badge.low {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .tx-label {
            color: #8899aa;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .tx-value {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8899aa;
        }

        .empty-state p {
            font-size: 1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>ARDEVO</h1>
            <p>WATCH. DETECT. PROTECT.</p>
        </div>
        <button class="run-btn" onclick="runAnalysis()">RUN ANALYSIS</button>
    </header>
<div class="main">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="total">0</div>
                <div class="label">ANALYZED</div>
            </div>
            <div class="stat-card">
                <div class="number" id="flagged">0</div>
                <div class="label">FLAGGED</div>
            </div>
            <div class="stat-card">
                <div class="number" id="high">0</div>
                <div class="label">HIGH RISK</div>
            </div>
            <div class="stat-card">
                <div class="number" id="flagRate">0%</div>
                <div class="label">FLAG RATE</div>
            </div>
        </div>

        <p class="section-title">TRANSACTION FEED</p>
        <div class="transaction-feed" id="feed">
            <div class="empty-state">
                <p>Press RUN ANALYSIS to begin monitoring</p>
            </div>
        </div>
    </div>
    <script>
    let totalCount = 0;
    let flaggedCount = 0;
    let highCount = 0;

    function generatePhone() {
        const prefixes = ["024","054","055","059","026","056","027","020","050"];
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        return prefix + Math.floor(1000000 + Math.random() * 9000000);
    }

    function generateAmount() {
        const roundNumbers = [200, 500, 1000, 1500, 2000, 2500];
        return Math.random() < 0.3 
            ? roundNumbers[Math.floor(Math.random() * roundNumbers.length)]
            : Math.floor(20 + Math.random() * 2980);
    }

    function generateTransaction() {
        const types = ["send_money","send_money","send_money","send_money",
                      "cash_out","cash_out","cash_out","cash_in","cash_in",
                      "bill_payment","reversal_request"];
        const networks = ["MTN","MTN","MTN","MTN","MTN","MTN","MTN",
                         "AirtelTigo","AirtelTigo","AirtelTigo","Vodafone"];
        const channels = ["USSD","USSD","USSD","USSD","USSD","Agent","Agent","Agent","App","App"];
        const hour = Math.floor(Math.random() * 24);

        return {
            trans_id: crypto.randomUUID(),
            sender_phone: generatePhone(),
            receiver_phone: generatePhone(),
            trans_type: types[Math.floor(Math.random() * types.length)],
            amount_ghs: generateAmount(),
            mobile_ntwk: networks[Math.floor(Math.random() * networks.length)],
            channel: channels[Math.floor(Math.random() * channels.length)],
            hour: hour
        };
    }

    const seenSenders = new Set();
    const reversalSenders = new Set();
    const senderCounts = {};

    function detectFraud(tx) {
        let score = 0;

        if (tx.trans_type === "reversal_request") {
            score += 30;
        }

        if (!seenSenders.has(tx.sender_phone)) {
            score += 10;
        }
        seenSenders.add(tx.sender_phone);

        if (tx.trans_type === "reversal_request") {
            if (reversalSenders.has(tx.sender_phone)) score += 40;
            reversalSenders.add(tx.sender_phone);
        }

        if (tx.hour < 5) score += 25;
        if (tx.amount_ghs > 2500) score += 15;

        senderCounts[tx.sender_phone] = (senderCounts[tx.sender_phone] || 0) + 1;
        if (senderCounts[tx.sender_phone] >= 3) score += 35;

        if (score >= 60) return { score, level: "HIGH", cls: "high" };
        if (score >= 45) return { score, level: "MEDIUM", cls: "medium" };
        return { score, level: "LOW", cls: "low" };
    }

    function updateStats(result) {
        totalCount++;
        if (result.level !== "LOW") {
            flaggedCount++;
            if (result.level === "HIGH") highCount++;
        }
        document.getElementById("total").textContent = totalCount;
        document.getElementById("flagged").textContent = flaggedCount;
        document.getElementById("high").textContent = highCount;
        document.getElementById("flagRate").textContent = 
            Math.round((flaggedCount / totalCount) * 100) + "%";
    }

    function addTransactionCard(tx, result) {
        const feed = document.getElementById("feed");
        const emptyState = feed.querySelector(".empty-state");
        if (emptyState) emptyState.remove();

        const card = document.createElement("div");
        card.className = `transaction-card ${result.cls}`;
        card.innerHTML = `
            <div>
                <div class="tx-label">TRANS ID</div>
                <div class="tx-value" style="font-size:0.75rem">${tx.trans_id.substring(0,16)}...</div>
            </div>
            <div>
                <div class="tx-label">TYPE</div>
                <div class="tx-value">${tx.trans_type}</div>
            </div>
            <div>
                <div class="tx-label">SENDER</div>
                <div class="tx-value">${tx.sender_phone}</div>
            </div>
            <div>
                <div class="tx-label">AMOUNT</div>
                <div class="tx-value">GHS ${tx.amount_ghs}</div>
            </div>
            <div>
                <div class="tx-label">NETWORK</div>
                <div class="tx-value">${tx.mobile_ntwk}</div>
            </div>
            <div>
                <span class="risk-badge ${result.cls}">${result.level} RISK — ${result.score}</span>
            </div>
        `;
        feed.insertBefore(card, feed.firstChild);
    }

    async function runAnalysis() {
        totalCount = 0;
        flaggedCount = 0;
        highCount = 0;
        seenSenders.clear();
        reversalSenders.clear();
        Object.keys(senderCounts).forEach(k => delete senderCounts[k]);
        document.getElementById("feed").innerHTML = '';
        document.getElementById("total").textContent = "0";
        document.getElementById("flagged").textContent = "0";
        document.getElementById("high").textContent = "0";
        document.getElementById("flagRate").textContent = "0%";

        for (let i = 0; i < 100; i++) {
            const tx = generateTransaction();
            const result = detectFraud(tx);
            updateStats(result);
            if (result.level !== "LOW") {
                addTransactionCard(tx, result);
            }
            await new Promise(r => setTimeout(r, 50));
        }
    }
</script>
<footer style="
        background: #0f1923;
        border-top: 1px solid #D4A017;
        padding: 20px 40px;
        text-align: center;
        color: #8899aa;
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.8rem;
        letter-spacing: 1px;
    ">
        © 2026 Ardevo. All rights reserved. | Built by Felix Dadzie
    </footer>
</body>
</html>
